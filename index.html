<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phone Shop</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f2f2f2;
  text-align: center;
}

.container {
  margin-top: 80px;
}

input {
  padding: 10px;
  width: 200px;
  margin: 5px;
}

button {
  padding: 10px 15px;
  margin-top: 10px;
  cursor: pointer;
  background: #25D366;
  border: none;
  color: white;
}

.products {
  display: none;
  margin-top: 30px;
}

.card {
  background: white;
  padding: 15px;
  margin: 15px;
  display: inline-block;
  width: 200px;
  border-radius: 10px;
}

.card img {
  width: 100%;
}

.logout {
  background: red;
}
</style>

</head>
<body>

<div class="container" id="loginBox">
  <h2>Login</h2>
  <input type="text" id="username" placeholder="Enter Username"><br>
  <input type="password" id="password" placeholder="Enter Password"><br>
  <button onclick="login()">Login</button>
</div>

<div class="products" id="shop">
  <h2>Welcome to Phone Shop</h2>
  <button class="logout" onclick="logout()">Logout</button>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>iPhone 13</h3>
    <p>Price: 350,000 CFA</p>
    <button onclick="buy('iPhone 13')">Buy</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Samsung S21</h3>
    <p>Price: 250,000 CFA</p>
    <button onclick="buy('Samsung S21')">Buy</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Redmi Note 11</h3>
    <p>Price: 120,000 CFA</p>
    <button onclick="buy('Redmi Note 11')">Buy</button>
  </div>

</div>

<script>
// SIMPLE LOGIN (DEMO ONLY)
function login() {
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if(user !== "" && pass !== "") {
    localStorage.setItem("loggedIn", "true");
    showShop();
  } else {
    alert("Enter login details");
  }
}

// SHOW SHOP
function showShop() {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("shop").style.display = "block";
}

// LOGOUT
function logout() {
  localStorage.removeItem("loggedIn");
  location.reload();
}

// WHATSAPP BUY
function buy(product) {
  let number = "237673178889";
  let message = "Hello, I want to buy " + product;
  let url = "https://wa.me/" + number + "?text=" + encodeURIComponent(message);
  window.open(url, "_blank");
}

// KEEP USER LOGGED IN
if(localStorage.getItem("loggedIn") === "true") {
  showShop();
}
</script>

</body>
</html>
